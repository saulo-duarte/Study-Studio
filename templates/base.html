{% load static %}

<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Studio</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    </header>
    <aside class="sidebar">
        <h2 class="study_studio">Study Studio</h2>
        <div class="divider"></div>
        <ul class="menu-list">
            <li class="menu-item">
                <a href="{% url 'home' %}">
                    <div class="icon-container">
                        <img src="{% static 'svg/home.svg' %}" alt="Home" class="home-icon">
                        Home
                    </div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'topics' %}">
                    <div class="icon-container">
                        <img src="{% static 'svg/topics.svg' %}" alt="Topics" class="topics-icon">
                        Topics
                    </div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'tasks' %}">
                    <div class="icon-container">
                        <img src="{% static 'svg/calendar.svg' %}" alt="tasks" class="tasks-icon">
                        Tasks
                    </div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'dashboard' %}">
                    <div class="icon-container">
                        <img src="{% static 'svg/dashboard.svg' %}" alt="Dashboard" class="dashboard-icon">
                        Dashboard
                    </div>
                </a>
            </li>
            <li class="menu-item">
                <a href="{% url 'dashboard' %}">
                    <div class="icon-container">
                        <img src="{% static 'svg/notes.svg' %}" alt="Notes" class="notes-icon">
                        Notes
                     </div>
                </a> 
            </li>
        </ul>
    </aside>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
