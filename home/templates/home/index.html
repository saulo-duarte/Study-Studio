{% extends 'base.html' %}
{% load static %}

{% block content %}
<head>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<div class="home-container">
    <div class="left-container">
        <h1>Welcome {{ user.username }} to your Study Space</h1>
        <div class="metrics">
            <div class="cards">Daily Sequence: 0</div>
            <div class="cards">Current Weekly Hours: 0</div>
            <div class="cards">Meta Hours: 0</div>
        </div>
        <h3>Last Contents Studied:</h3>
    </div>
    <div class="right-container">
        <p>No Contents studied yet!</p>
    </div>
</div>
{% endblock %}
